      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_user
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - mysql-db
      - eureka-server
      - config-server

  game-service:
