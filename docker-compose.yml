services:

  mysql-db:
    restart: always
    image: mysql:8.0
    container_name: mysql_dygames
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    healthcheck: # ← AGREGAR ESTO
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  eureka-server:
    restart: always
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-dygames
    ports:
      - "8761:8761"
    depends_on:
      - mysql-db

  config-server:
    restart: always
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-dygames
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCHLOCATIONS: file:/config-microservicios
    ports:
      - "8888:8888"
    volumes:
      - ./config-server/src/main/resources/config:/config-microservicios
    depends_on:
      - eureka-server

  auth-service:
    restart: always
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-dygames
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_auth
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - mysql-db
      - eureka-server
      - config-server

  user-service:
    restart: always
    build:
      context: ./user-service
      dockerfile: Dockerfile
